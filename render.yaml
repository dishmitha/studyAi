services:
  - type: web
    name: studysync
    env: docker
    dockerfilePath: Dockerfile
    dockerCommand: java -jar app.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://your-render-pg-host:5432/studysync # From Render PostgreSQL Internal DB URL
      - key: SPRING_DATASOURCE_USERNAME
        value: your-render-pg-user
      - key: SPRING_DATASOURCE_PASSWORD
        value: your-render-pg-password
      - key: JWT_SECRET
        value: your-very-secure-64-char-secret-key-change-this
      - key: JWT_FILTER_ENABLED
        value: "true" # Enable for prod
    autoDeploy: true
    # After Render deploy: Create PostgreSQL instance, copy Internal URL/User/Pass to these vars. H2 fallback disabled in prod.
