# Database Configuration - Use environment variables for Render deployment
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/studysync}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pluto1307@}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=${PORT:8080}

# Allow circular references
spring.main.allow-circular-references=true

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGeneration12345}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.filter.enabled=${JWT_FILTER_ENABLED:false}
